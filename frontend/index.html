<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>EduReels - Shorts-Style Content Generator</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html,
			body {
				width: 100%;
				height: 100vh;
				overflow: hidden;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}

			/* Animated Background */
			body {
				background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
				background-size: 400% 400%;
				animation: gradient 15s ease infinite;
				color: white;
				padding: 0;
				display: flex;
				position: relative;
				overflow: hidden;
			}

			@keyframes gradient {
				0% {
					background-position: 0% 50%;
				}
				50% {
					background-position: 100% 50%;
				}
				100% {
					background-position: 0% 50%;
				}
			}

			/* Floating particles background */
			body::before {
				content: "";
				position: fixed;
				width: 100%;
				height: 100%;
				top: 0;
				left: 0;
				pointer-events: none;
				background-image:
					radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)), radial-gradient(2px 2px at 60px 70px, #fff, rgba(0, 0, 0, 0)), radial-gradient(1px 1px at 50px 50px, #fff, rgba(0, 0, 0, 0)),
					radial-gradient(1px 1px at 130px 80px, #fff, rgba(0, 0, 0, 0)), radial-gradient(2px 2px at 90px 10px, #fff, rgba(0, 0, 0, 0));
				background-repeat: repeat;
				background-size: 200px 200px;
				animation: twinkle 5s infinite;
				opacity: 0.15;
				z-index: 0;
			}

			@keyframes twinkle {
				0%,
				100% {
					opacity: 0.1;
				}
				50% {
					opacity: 0.25;
				}
			}

			/* Main Container - TikTok/Shorts Style */
			.container {
				width: 100%;
				height: 100vh;
				display: flex;
				position: relative;
				z-index: 1;
			}

			/* Left Control Panel */
			.left-panel {
				width: 80px;
				height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				gap: 30px;
				padding: 20px 0;
				background: rgba(0, 0, 0, 0.2);
				border-right: 1px solid rgba(102, 126, 234, 0.2);
				backdrop-filter: blur(20px);
				box-shadow: inset 1px 0 0 rgba(255, 255, 255, 0.1);
			}

			.control-btn {
				width: 60px;
				height: 60px;
				border-radius: 50%;
				border: 2px solid rgba(102, 126, 234, 0.4);
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.1));
				color: #a0a0ff;
				font-size: 24px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				flex-shrink: 0;
				box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
				position: relative;
				overflow: hidden;
			}

			.control-btn::before {
				content: "";
				position: absolute;
				top: -50%;
				left: -50%;
				width: 200%;
				height: 200%;
				background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent);
				opacity: 0;
				transition: opacity 0.3s;
			}

			.control-btn:hover {
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.3));
				border-color: rgba(102, 126, 234, 0.8);
				transform: scale(1.12) translateY(-2px);
				box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
			}

			.control-btn:hover::before {
				opacity: 1;
			}

			.control-btn:active {
				transform: scale(0.95) translateY(0);
				box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
			}

			.control-btn:disabled {
				opacity: 0.3;
				cursor: not-allowed;
				box-shadow: none;
			}

			/* Center Content Area */
			.center-area {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				perspective: 1000px;
				padding: 40px;
			}

			/* Card Stack */
			.card-stack {
				position: relative;
				width: 100%;
				max-width: 600px;
				height: 100%;
				max-height: 800px;
			}

			.card-stack.empty {
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.card-stack.empty::after {
				content: "🎬 Select a topic to begin";
				font-size: 24px;
				color: rgba(255, 255, 255, 0.5);
				text-align: center;
			}

			.card {
				position: absolute;
				width: 100%;
				height: 100%;
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(118, 75, 162, 0.08) 100%);
				border: 1.5px solid rgba(102, 126, 234, 0.3);
				border-radius: 24px;
				padding: 40px;
				backdrop-filter: blur(30px);
				overflow-y: auto;
				animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
				transform-origin: bottom;
				box-shadow:
					0 25px 60px rgba(102, 126, 234, 0.2),
					inset 0 1px 0 rgba(255, 255, 255, 0.1);
			}

			.card::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 1px;
				background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
				border-radius: 24px 24px 0 0;
			}

			.card.previous {
				animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
			}

			@keyframes slideUp {
				from {
					opacity: 0;
					transform: translateY(60px) scale(0.9) rotateX(-10deg);
				}
				to {
					opacity: 1;
					transform: translateY(0) scale(1) rotateX(0deg);
				}
			}

			@keyframes slideDown {
				from {
					opacity: 0;
					transform: translateY(-60px) scale(0.9) rotateX(10deg);
				}
				to {
					opacity: 1;
					transform: translateY(0) scale(1) rotateX(0deg);
				}
			}

			.card-title {
				font-size: 28px;
				font-weight: 700;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				margin-bottom: 20px;
				animation: fadeIn 0.8s ease-out;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}

			.card-content {
				font-size: 16px;
				line-height: 1.8;
				color: rgba(255, 255, 255, 0.9);
			}

			.card-content h3 {
				color: #a0a0ff;
				margin-top: 20px;
				margin-bottom: 10px;
				font-size: 16px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1px;
				opacity: 0.9;
			}

			.card-content ul {
				list-style: none;
				margin-left: 20px;
			}

			.card-content li {
				margin-bottom: 10px;
				position: relative;
				padding-left: 20px;
				transition: all 0.3s ease;
			}

			.card-content li:hover {
				transform: translateX(5px);
				color: #a0a0ff;
			}

			.card-content li::before {
				content: "→";
				position: absolute;
				left: 0;
				color: #667eea;
				font-weight: bold;
			}

			.copy-btn-small {
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.2));
				border: 1px solid rgba(102, 126, 234, 0.5);
				color: #a0a0ff;
				padding: 10px 20px;
				border-radius: 8px;
				cursor: pointer;
				font-size: 12px;
				font-weight: 600;
				margin-top: 20px;
				transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
			}

			.copy-btn-small:hover {
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.5), rgba(118, 75, 162, 0.4));
				border-color: rgba(102, 126, 234, 0.8);
				transform: translateY(-2px);
				box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
			}

			.copy-btn-small:active {
				transform: translateY(0);
			}

			.card-counter {
				position: absolute;
				bottom: 20px;
				right: 20px;
				font-size: 12px;
				color: rgba(255, 255, 255, 0.5);
				background: rgba(102, 126, 234, 0.2);
				padding: 6px 12px;
				border-radius: 12px;
				border: 1px solid rgba(102, 126, 234, 0.3);
			}

			/* Right Action Panel */
			.right-panel {
				width: 80px;
				height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				gap: 30px;
				padding: 20px 0;
				background: rgba(0, 0, 0, 0.2);
				border-left: 1px solid rgba(102, 126, 234, 0.2);
				backdrop-filter: blur(20px);
				box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.1);
			}

			.action-btn {
				width: 60px;
				height: 60px;
				border-radius: 50%;
				border: 2px solid rgba(102, 126, 234, 0.4);
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.1));
				color: #a0a0ff;
				font-size: 24px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				flex-shrink: 0;
				box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
				position: relative;
				overflow: hidden;
			}

			.action-btn::before {
				content: "";
				position: absolute;
				top: -50%;
				left: -50%;
				width: 200%;
				height: 200%;
				background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent);
				opacity: 0;
				transition: opacity 0.3s;
			}

			.action-btn:hover {
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.3));
				border-color: rgba(102, 126, 234, 0.8);
				transform: scale(1.12) translateY(-2px);
				box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
			}

			.action-btn:hover::before {
				opacity: 1;
			}

			.action-btn:active {
				transform: scale(0.95) translateY(0);
				box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
			}

			/* Bottom Input Overlay */
			.bottom-overlay {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				height: 140px;
				background: linear-gradient(180deg, transparent 0%, rgba(15, 12, 41, 0.8) 50%, rgba(15, 12, 41, 0.95) 100%);
				backdrop-filter: blur(30px);
				display: flex;
				align-items: flex-end;
				justify-content: center;
				padding: 30px 20px;
				gap: 15px;
				z-index: 100;
				border-top: 1px solid rgba(102, 126, 234, 0.2);
				box-shadow: 0 -10px 40px rgba(102, 126, 234, 0.15);
			}

			.degree-select {
				padding: 14px 24px;
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.1));
				border: 1.5px solid rgba(102, 126, 234, 0.4);
				border-radius: 25px;
				color: white;
				font-size: 14px;
				font-weight: 500;
				cursor: pointer;
				transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				flex: 0 1 220px;
				box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
			}

			.degree-select:hover {
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.25), rgba(118, 75, 162, 0.15));
				border-color: rgba(102, 126, 234, 0.6);
				transform: translateY(-2px);
				box-shadow: 0 12px 30px rgba(102, 126, 234, 0.2);
			}

			.degree-select:focus {
				outline: none;
				border-color: #667eea;
				background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.2));
				box-shadow:
					0 12px 30px rgba(102, 126, 234, 0.25),
					0 0 0 3px rgba(102, 126, 234, 0.1);
			}

			.degree-select option {
				background: #1a1a2e;
				color: white;
			}

			.generate-btn-bottom {
				padding: 14px 32px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				border: none;
				border-radius: 25px;
				font-size: 14px;
				font-weight: 700;
				cursor: pointer;
				transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				flex-shrink: 0;
				box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				position: relative;
				overflow: hidden;
			}

			.generate-btn-bottom::before {
				content: "";
				position: absolute;
				top: -50%;
				left: -50%;
				width: 200%;
				height: 200%;
				background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent);
				opacity: 0;
				transition: opacity 0.3s;
			}

			.generate-btn-bottom:hover:not(:disabled) {
				transform: translateY(-3px);
				box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
			}

			.generate-btn-bottom:hover:not(:disabled)::before {
				opacity: 1;
			}

			.generate-btn-bottom:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			.btn-spinner {
				width: 16px;
				height: 16px;
				border: 2px solid rgba(255, 255, 255, 0.2);
				border-top-color: white;
				border-radius: 50%;
				animation: spin 1s linear infinite;
			}

			.btn-spinner.hidden {
				display: none;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* Keyboard hint */
			.keyboard-hint {
				position: fixed;
				bottom: 150px;
				right: 100px;
				font-size: 12px;
				color: rgba(255, 255, 255, 0.4);
				text-align: right;
				pointer-events: none;
			}

			/* Loading indicator */
			.loading-spinner {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 80px;
				height: 80px;
				border: 5px solid rgba(102, 126, 234, 0.15);
				border-top-color: #667eea;
				border-right-color: rgba(118, 75, 162, 0.8);
				border-radius: 50%;
				animation: spin 1.5s linear infinite;
				z-index: 200;
				display: none;
				box-shadow:
					0 0 30px rgba(102, 126, 234, 0.3),
					inset 0 0 30px rgba(102, 126, 234, 0.1);
			}

			.loading-spinner.active {
				display: block;
			}

			/* Confetti animation */
			.confetti {
				position: fixed;
				pointer-events: none;
				z-index: 999;
			}

			@keyframes confetti-fall {
				0% {
					transform: translateY(0) rotateZ(0deg);
					opacity: 1;
				}
				100% {
					transform: translateY(100vh) rotateZ(720deg);
					opacity: 0;
				}
			}

			/* Error Toast */
			.error-toast {
				position: fixed;
				bottom: 160px;
				left: 50%;
				transform: translateX(-50%);
				background: rgba(255, 107, 107, 0.2);
				border: 1px solid rgba(255, 107, 107, 0.4);
				color: #ff9999;
				padding: 12px 24px;
				border-radius: 25px;
				font-size: 14px;
				max-width: 400px;
				text-align: center;
				display: none;
				z-index: 150;
				animation: toastSlideUp 0.3s ease-out;
			}

			.error-toast.show {
				display: block;
			}

			@keyframes toastSlideUp {
				from {
					opacity: 0;
					transform: translateX(-50%) translateY(20px);
				}
				to {
					opacity: 1;
					transform: translateX(-50%) translateY(0);
				}
			}

			/* Mobile Responsive */
			@media (max-width: 768px) {
				.left-panel,
				.right-panel {
					width: 50px;
					gap: 15px;
				}

				.control-btn,
				.action-btn {
					width: 45px;
					height: 45px;
					font-size: 20px;
				}

				.center-area {
					padding: 20px;
				}

				.card {
					padding: 25px;
					border-radius: 15px;
				}

				.card-title {
					font-size: 22px;
				}

				.card-content {
					font-size: 14px;
				}

				.bottom-overlay {
					height: 100px;
					padding-bottom: 20px;
				}

				.degree-select {
					flex: 0 1 150px;
					font-size: 12px;
				}

				.keyboard-hint {
					display: none;
				}
			}

			@media (max-width: 480px) {
				.left-panel,
				.right-panel {
					width: 40px;
				}

				.control-btn,
				.action-btn {
					width: 40px;
					height: 40px;
					font-size: 18px;
				}

				.center-area {
					padding: 10px;
				}

				.card {
					padding: 20px;
				}

				.bottom-overlay {
					flex-wrap: wrap;
					gap: 10px;
					padding: 15px;
					padding-bottom: 20px;
				}

				.degree-select {
					flex: 1;
					min-width: 120px;
				}

				.generate-btn-bottom {
					padding: 10px 20px;
					font-size: 12px;
				}
			}
		</style>
	</head>
	<body>
		<!-- Left Control Panel -->
		<div class="left-panel">
			<button class="control-btn" id="prev-btn" title="Previous (←)">‹</button>
			<button class="control-btn" id="generate-btn" title="Generate (Space)">✨</button>
			<button class="control-btn" id="next-btn" title="Next (→)">›</button>
		</div>

		<!-- Center Card Stack Area -->
		<div class="center-area">
			<div class="card-stack empty" id="card-stack"></div>
		</div>

		<!-- Right Action Panel -->
		<div class="right-panel">
			<button class="action-btn" id="copy-btn" title="Copy">📋</button>
			<button class="action-btn" id="share-btn" title="Share">🔗</button>
			<button class="action-btn" id="download-btn" title="Download">💾</button>
		</div>

		<!-- Bottom Input Overlay -->
		<div class="bottom-overlay">
			<select id="degree-select" class="degree-select">
				<option value="">Select subject...</option>
				<option value="Computer Science">💻 Computer Science</option>
				<option value="Electrical Engineering">⚡ Electrical Engineering</option>
				<option value="Mechanical Engineering">🔧 Mechanical Engineering</option>
			</select>
			<button class="generate-btn-bottom" id="gen-btn-bottom" disabled>
				<span class="btn-text">✨ Generate</span>
				<span class="btn-spinner hidden"></span>
			</button>
		</div>

		<!-- Loading Spinner -->
		<div class="loading-spinner" id="loading-spinner"></div>

		<!-- Error Toast -->
		<div class="error-toast" id="error-toast"></div>

		<!-- Keyboard Hint -->
		<div class="keyboard-hint">← → Space</div>

		<script>
			const API_BASE_URL = "http://localhost:8000";
			let cards = [];
			let currentIndex = 0;
			let isLoading = false;

			// Enable button when degree is selected
			document.getElementById("degree-select").addEventListener("change", function () {
				document.getElementById("gen-btn-bottom").disabled = !this.value;
				document.getElementById("generate-btn").disabled = !this.value;
			});

			// Generate button click (left panel)
			document.getElementById("generate-btn").addEventListener("click", generateContent);

			// Generate button click (bottom overlay)
			document.getElementById("gen-btn-bottom").addEventListener("click", generateContent);

			// Navigation buttons
			document.getElementById("prev-btn").addEventListener("click", showPrevious);
			document.getElementById("next-btn").addEventListener("click", showNext);

			// Action buttons
			document.getElementById("copy-btn").addEventListener("click", copyCurrentCard);
			document.getElementById("share-btn").addEventListener("click", shareCurrentCard);
			document.getElementById("download-btn").addEventListener("click", downloadCurrentCard);

			// Keyboard shortcuts
			document.addEventListener("keydown", handleKeyboard);

			function handleKeyboard(e) {
				if (e.code === "ArrowLeft") showPrevious();
				if (e.code === "ArrowRight") showNext();
				if (e.code === "Space") {
					e.preventDefault();
					generateContent();
				}
			}

			async function generateContent() {
				const degree = document.getElementById("degree-select").value;
				if (!degree || isLoading) return;

				isLoading = true;
				const spinner = document.querySelector(".btn-spinner");
				const loader = document.getElementById("loading-spinner");

				spinner.classList.remove("hidden");
				loader.classList.add("active");

				try {
					// Always force fresh generation with skip_cache and unique timestamp
					const response = await fetch(`${API_BASE_URL}/generate`, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"Cache-Control": "no-cache",
							Pragma: "no-cache",
						},
						body: JSON.stringify({
							degree,
							skip_cache: true,
							timestamp: Date.now(), // Force unique request each time
							random: Math.random(), // Extra randomization
						}),
					});

					if (!response.ok) throw new Error(`HTTP ${response.status}`);

					const data = await response.json();

					// Always add to cards array instead of replacing
					// This creates a history of unique questions
					cards.push(data);
					currentIndex = cards.length - 1;
					renderCard(currentIndex, false);
					updateCardStack();

					// Show success message
					showError("✨ Fresh question generated!", "success");
					createConfetti();
				} catch (err) {
					showError(`Error: ${err.message}. Make sure API is running on ${API_BASE_URL}`);
				} finally {
					isLoading = false;
					spinner.classList.add("hidden");
					loader.classList.remove("active");
				}
			}

			function renderCard(index, isPrevious = false) {
				const stack = document.getElementById("card-stack");
				const card = cards[index];

				const cardEl = document.createElement("div");
				cardEl.className = `card ${isPrevious ? "previous" : ""}`;
				cardEl.innerHTML = `
					<div class="card-title">🎬 ${card.topic || "Content"}</div>
					<div class="card-content">
						<h3>❓ Question</h3>
						<p>${card.reel_question || ""}</p>

						<h3>📖 Answer</h3>
						<p>${card.reel_answer || ""}</p>

						<h3>💡 Simplified</h3>
						<p>${card.simplified_answer || ""}</p>

						<h3>💬 Analogy</h3>
						<p>${card.analogy || "N/A"}</p>

						<h3>🌍 Example</h3>
						<p>${card.primary_example || ""}</p>

						${
							card.secondary_examples && card.secondary_examples.length > 0
								? `
							<h3>📚 More Examples</h3>
							<ul>
								${card.secondary_examples.map((ex) => `<li>${ex}</li>`).join("")}
							</ul>
						`
								: ""
						}

						<h3>🎬 Hook</h3>
						<p>${card.hook || ""}</p>

						${
							card.engagement_tips && card.engagement_tips.length > 0
								? `
							<h3>✨ Tips</h3>
							<ul>
								${card.engagement_tips.map((tip) => `<li>${tip}</li>`).join("")}
							</ul>
						`
								: ""
						}

						<button class="copy-btn-small" onclick="copyText('${index}')">📋 Copy Content</button>
					</div>
					<div class="card-counter">${index + 1}</div>
				`;

				stack.innerHTML = "";
				stack.appendChild(cardEl);
				stack.classList.remove("empty");
			}

			function showNext() {
				if (cards.length === 0) return;
				currentIndex = (currentIndex + 1) % cards.length;
				renderCard(currentIndex);
			}

			function showPrevious() {
				if (cards.length === 0) return;
				currentIndex = (currentIndex - 1 + cards.length) % cards.length;
				renderCard(currentIndex, true);
			}

			function updateCardStack() {
				const haCards = cards.length > 0;
				document.getElementById("prev-btn").disabled = !haCards;
				document.getElementById("next-btn").disabled = !haCards;
				document.getElementById("copy-btn").disabled = !haCards;
				document.getElementById("share-btn").disabled = !haCards;
				document.getElementById("download-btn").disabled = !haCards;
			}

			function copyCurrentCard() {
				if (cards.length === 0) return;
				const card = cards[currentIndex];
				const text = `
Topic: ${card.topic}
Question: ${card.reel_question}
Answer: ${card.reel_answer}
Simplified: ${card.simplified_answer}
Example: ${card.primary_example}
Hook: ${card.hook}
				`.trim();

				navigator.clipboard.writeText(text).then(() => {
					showError("✅ Copied to clipboard!", "success");
				});
			}

			function shareCurrentCard() {
				if (cards.length === 0) return;
				const card = cards[currentIndex];
				const text = `Check out this educational content: ${card.topic} - ${card.reel_question}`;

				if (navigator.share) {
					navigator.share({
						title: "EduReels",
						text: text,
					});
				} else {
					navigator.clipboard.writeText(text);
					showError("✅ Shared text copied!", "success");
				}
			}

			function downloadCurrentCard() {
				if (cards.length === 0) return;
				const card = cards[currentIndex];
				const content = `
EduReels - ${card.topic}

Question: ${card.reel_question}

Answer: ${card.reel_answer}

Simplified: ${card.simplified_answer}

Analogy: ${card.analogy}

Example: ${card.primary_example}

Hook: ${card.hook}

Generated: ${new Date().toLocaleString()}
				`.trim();

				const blob = new Blob([content], { type: "text/plain" });
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = `${card.topic.replace(/\s+/g, "_")}.txt`;
				a.click();
				URL.revokeObjectURL(url);
			}

			function copyText(index) {
				const card = cards[index];
				const text = `${card.reel_question}\n\n${card.reel_answer}`;
				navigator.clipboard.writeText(text);
				showError("✅ Copied to clipboard!", "success");
				createConfetti();
			}

			function showError(message, type = "error") {
				const toast = document.getElementById("error-toast");
				toast.textContent = message;
				toast.className = `error-toast show ${type}`;

				setTimeout(() => {
					toast.classList.remove("show");
				}, 3000);
			}

			function createConfetti() {
				const confettiPieces = 50;
				const colors = ["#667eea", "#764ba2", "#a0a0ff", "#f093fb", "#4facfe"];

				for (let i = 0; i < confettiPieces; i++) {
					const confetti = document.createElement("div");
					confetti.className = "confetti";
					confetti.style.left = Math.random() * 100 + "%";
					confetti.style.top = "-10px";
					confetti.style.width = "10px";
					confetti.style.height = "10px";
					confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
					confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
					confetti.style.animation = `confetti-fall ${2 + Math.random() * 1}s ease-in forwards`;
					confetti.style.opacity = Math.random() * 0.8 + 0.2;

					document.body.appendChild(confetti);

					setTimeout(() => confetti.remove(), 3000);
				}
			}
		</script>
	</body>
</html>
